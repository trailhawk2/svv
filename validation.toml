name = "Validation structure"

[ Geometry ]
#type     = 0                # [-] 1 if beam, 0 if rod structure is selected

L_beam   = 150             # [mm] Length of beam
d        = 10.4              # [mm] Width of beam

L_truss = 200                # [mm] Length of truss
alpha_truss = 45             # [deg] angle in truss

sym       = 1                # [-] condition for whether to make only half a telescope or whole (symmetrical)
deltaT    = 0              # [-] change in temperature

seeds     = 20                # [-] results in n + 2 nodes per part
lump_mass = 1                # [-] 1 if lumped mass matrix is to be used, 0 if full mass matrix is to be used (only for rod structure)


# --------------------------------------------------------------------------
# Section properties, array of tables
# --------------------------------------------------------------------------
[[ Sections ]]
A = 108.16                   # [mm^2]
I = 974.882                  # [mm^4]

[[ Sections ]]
A = 400                      # [mm^2]
I = 8000000                  # [mm^4]

[[ Sections ]]
A = 500                      # [mm^2]
I = 250000                   # [mm^4]

# --------------------------------------------------------------------------
# Select material and section properties for each part, [[beam],[truss]]
# --------------------------------------------------------------------------

[ PartProperties ]
materials = [[0, 0], [1,1,1,1,1]]      # index of material in materials dictionary [[beam],[truss]]
sections  = [[0, 0], [1,1,1,1,1]]    # index of section in secion list above

# --------------------------------------------------------------------------
# Applied forces
# --------------------------------------------------------------------------
[[ Forces ]]
point     = 1                # [-]
axis      = 1                # 0 for force along x axis, 1 for force along y
magnitude = -1000            # [N]
#
#[[ Forces ]]
#point     = 1                # [-]
#axis      = 0                # 0 for force along x axis, 1 for force along y
#magnitude = 10000            # [N]
#
## --------------------------------------------------------------------------
## Boundary conditions
## Note: specify the DOFs that are fixed only! By default, DOF is free
## Note: The program automatically selects the correct conditions based on the selected type
## --------------------------------------------------------------------------


## Boundry conditions for a Truss structure

[[ BoundaryConditions_Truss ]]
point = 2
DOF = [1, 1, 0]

[[ BoundaryConditions_Truss ]]
point = 4
DOF = [0, 1, 0]


## Boubdry conditions for a Beam structure

[[ BoundaryConditions_Beam ]]
point = 1
DOF = [0, 0, 1]

[[ BoundaryConditions_Beam ]]
point = 2
DOF = [1, 1, 0]

[[ BoundaryConditions_Beam ]]
point = 3
DOF = [0, 1, 0]
#
## --------------------------------------------------------------------------
## Output settings
## --------------------------------------------------------------------------
[ Output ]

nFreq      = 5               # [-] number of eigenfrequencies displayed
plot_scale = 1               # [-] displacement plot scale